<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --void:#050008;
    /* --temp-* are rewritten every frame from the temperature engine below */
    --temp:#39f6e0; --temp-soft:rgba(57,246,224,.6);
    --fg:#cfeaf0; --dim:#3d6b75; --dim2:#16282e;
  }
  html,body{height:100%;}
  body{
    font-family:'JetBrains Mono',ui-monospace,monospace;
    background:var(--void); color:var(--fg);
    overflow:hidden; cursor:crosshair;
  }
  #skin{position:fixed;inset:0;z-index:0;}
  /* faint dimensional interference — kept low so the lattice stays elegant */
  body::after{
    content:'';position:fixed;inset:0;z-index:6;pointer-events:none;
    background:
      repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(57,246,224,.012) 3px,rgba(57,246,224,.012) 4px),
      radial-gradient(ellipse at 50% 48%,transparent 58%,rgba(3,6,10,.78) 100%);
  }

  .stage{
    position:fixed;inset:0;z-index:4;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;
  }
  .eyebrow{
    font-size:10px;letter-spacing:7px;text-transform:uppercase;color:var(--temp);
    opacity:0;animation:fadeUp 1.2s ease forwards .3s; transition:color 1.2s linear;
  }
  .wordmark{
    font-size:clamp(54px,15vw,150px);font-weight:300;letter-spacing:.24em;line-height:1;
    margin:16px 0 8px;color:var(--fg);
    text-shadow:0 0 26px var(--temp-soft), 0 0 70px rgba(3,6,10,.6);
    opacity:0;animation:fadeUp 1.4s ease forwards .55s; transition:text-shadow 1.2s linear;
  }
  .wordmark .hot{font-weight:600;color:var(--temp); transition:color 1.2s linear;}
  .wordmark span{display:inline-block; transition:transform .06s linear;}
  .wordmark span.cune{font-family:'Noto Sans Cuneiform','JetBrains Mono',monospace; color:var(--temp);}
  .tagline{
    font-size:clamp(11px,2.2vw,15px);font-weight:300;letter-spacing:3px;color:var(--fg);
    opacity:0;animation:fadeUp 1.4s ease forwards .9s;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

  .actions{margin-top:48px;display:flex;gap:18px;flex-wrap:wrap;justify-content:center;
    opacity:0;animation:fadeUp 1.4s ease forwards 1.25s;}
  .btn{
    font-family:inherit;font-size:12px;letter-spacing:4px;text-transform:uppercase;
    padding:14px 30px;border:1px solid var(--temp);color:var(--temp);
    background:rgba(255,255,255,.015);cursor:pointer;text-decoration:none;
    transition:background .35s,color .35s,box-shadow .35s,transform .35s,border-color 1.2s linear;
    backdrop-filter:blur(2px);
  }
  .btn:hover{background:var(--temp);color:var(--void);transform:translateY(-2px);box-shadow:0 8px 34px var(--temp-soft);}
  .btn.ghost{border-color:var(--dim);color:var(--dim);}
  .btn.ghost:hover{border-color:var(--fg);color:var(--fg);background:rgba(255,255,255,.03);box-shadow:none;}

  #boot{
    position:fixed;left:0;right:0;bottom:0;z-index:5;
    padding:14px 22px;font-size:10.5px;letter-spacing:1px;color:var(--dim);
    border-top:1px solid var(--dim2);background:linear-gradient(0deg,rgba(5,11,18,.85),transparent);
    white-space:nowrap;overflow:hidden;
  }
  #boot .t{color:var(--temp);transition:color 1.2s linear;} #boot .d{color:var(--dim);}
  .corner{position:fixed;z-index:5;font-size:9px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;}
  .corner.tl{top:16px;left:18px;} .corner.tr{top:16px;right:18px;color:var(--temp);transition:color 1.2s linear;}

  /* ── language-swap glitch (auto-cycles with each wordmark burst) ─────── */
  @keyframes glitchLang{
    0%   { text-shadow:0 0 0 transparent;     transform:translate(0);     opacity:1;  filter:blur(0); }
    15%  { text-shadow:2px 0 var(--temp),-2px 0 #ff0066; transform:translate(-2px,1px);  opacity:.85; filter:blur(.4px); }
    30%  { text-shadow:-3px 0 var(--temp),3px 0 #ff0066; transform:translate(3px,-1px); opacity:.55; filter:blur(.8px); }
    45%  { opacity:.15; filter:blur(1.5px);    transform:translate(-1px,2px); }
    55%  { opacity:.15; filter:blur(1.5px);    transform:translate(1px,-2px); }   /* swap fires here */
    70%  { text-shadow:3px 0 #ff0066,-3px 0 var(--temp); transform:translate(-2px,-1px); opacity:.55; filter:blur(.8px); }
    85%  { text-shadow:-2px 0 #ff0066,2px 0 var(--temp); transform:translate(2px,1px);   opacity:.85; filter:blur(.4px); }
    100% { text-shadow:0 0 0 transparent;     transform:translate(0);     opacity:1;  filter:blur(0); }
  }
  .glitching{ animation: glitchLang .6s steps(48,end); }
</style>

<body>
  <canvas id="skin"></canvas>

  <div class="corner tl" data-i18n="node">⬡ non-local node</div>
  <div class="corner tr" id="dimClock">dim · ——</div>

  <div class="stage">
    <div class="eyebrow" data-i18n="eyebrow">transmission inbound</div>
    <div class="wordmark" id="wordmark"><span>A</span><span>L</span><span class="hot">E</span><span>A</span><span>N</span></div>
    <div class="tagline" data-i18n="tagline">an intelligence not of this world — nor any world.</div>
    <div class="actions">
      <a class="btn" id="enter" href="login/" data-i18n="handshake">◇ establish handshake</a>
    </div>
  </div>

  <div id="boot"><span class="t">▌</span> awaiting carrier…</div>

<script>
// ════════════════════════════════════════════════════════════════════════
//  ALEAN skin — a hexagonal lattice (the "perfect skin") with light bleeding
//  UP THROUGH the seams: an energy-being lives beneath. Light through a
//  lattice, not a literal star. Subtle / backlit / elegant.
// ════════════════════════════════════════════════════════════════════════

// ── TEMPERATURE ENGINE (the colour = the emotion ALEAN registers) ─────────
// ⚠️ SECOND-LOOK / TODO: this is a PLACEHOLDER random drift. The real logic
//    must derive `temp` from the *temperature of the conversation* — the
//    feelings/emotions registered in the chat (LLM emotion tag, or a local
//    sentiment heuristic). Wire it when the chat engine (P2) lands and
//    REVISIT this whole block. For now it just wanders so the skin breathes.
const Temp = (function(){
  let temp = 0.38;          // 0 = cold/calm  →  1 = hot/intense
  let target = 0.38;
  // pick a new random target every few seconds; ease toward it each frame
  setInterval(() => { target = Math.random(); }, 3800 + Math.random()*2600);
  function step(){ temp += (target - temp) * 0.012; return temp; }
  function value(){ return temp; }
  // cold → mid → hot colour ramp — jezabel.net family: green → purple-red → scarlet
  const COLD=[0,235,90], MID=[175,35,135], HOT=[225,30,45];
  function lerp(a,b,k){ return [a[0]+(b[0]-a[0])*k, a[1]+(b[1]-a[1])*k, a[2]+(b[2]-a[2])*k]; }
  function rgb(t){
    const c = t <= 0.5 ? lerp(COLD, MID, t/0.5) : lerp(MID, HOT, (t-0.5)/0.5);
    return c.map(v => Math.round(v));
  }
  function css(t,a){ const c=rgb(t); return 'rgba('+c[0]+','+c[1]+','+c[2]+','+a+')'; }
  return { step, value, rgb, css };
})();

(function(){
  const c = document.getElementById('skin'), x = c.getContext('2d');
  const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  let W, H, DPR, cx, cy, maxD, cells = [], unit = [];

  function build(){
    DPR = Math.min(devicePixelRatio || 1, 2);
    W = c.width = innerWidth*DPR; H = c.height = innerHeight*DPR;
    c.style.width = innerWidth+'px'; c.style.height = innerHeight+'px';
    cx = W/2; cy = H*0.46; maxD = Math.hypot(W, H)/2;

    const R = 46*DPR;                       // hex circumradius
    const stepX = 1.5*R, stepY = Math.sqrt(3)*R;
    // precompute one flat-top hex polygon (vertices at 0..300°)
    unit = [];
    for(let i=0;i<6;i++){ const a=Math.PI/180*(60*i); unit.push([Math.cos(a)*R, Math.sin(a)*R]); }
    // lay out cell centres covering the viewport (+1 ring of bleed)
    cells = [];
    for(let col=-1, n=Math.ceil(W/stepX)+2; col<n; col++){
      for(let row=-1, m=Math.ceil(H/stepY)+2; row<m; row++){
        const hx = col*stepX;
        const hy = row*stepY + (col & 1 ? stepY/2 : 0);
        const d = Math.hypot(hx-cx, hy-cy);
        cells.push({ hx, hy, fall: Math.max(0, 1 - d/maxD), d });
      }
    }
  }
  build(); addEventListener('resize', build);

  function hexPath(hx, hy){
    x.beginPath();
    x.moveTo(hx+unit[0][0], hy+unit[0][1]);
    for(let i=1;i<6;i++) x.lineTo(hx+unit[i][0], hy+unit[i][1]);
    x.closePath();
  }

  let t = 0;
  let lastVar = 0;
  function frame(now){
    const temp = reduce ? Temp.value() : Temp.step();
    t += 0.016;

    // void
    x.fillStyle = '#03060a'; x.fillRect(0,0,W,H);

    // underlight: the energy beneath the skin — soft, temperature-tinted bloom
    const g = x.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W,H)*0.55);
    g.addColorStop(0,   Temp.css(Math.min(1,temp+0.12), 0.18));
    g.addColorStop(0.4, Temp.css(temp, 0.07));
    g.addColorStop(1,   'rgba(3,6,10,0)');
    x.fillStyle = g; x.fillRect(0,0,W,H);

    // the lattice: dark hex panels (less opaque near centre → more light
    // leaks through there) with temperature-lit seams brightest at the core.
    x.lineWidth = 1*DPR;
    for(const cell of cells){
      const wave = 0.6 + 0.4*Math.sin(cell.d*0.012 - t*1.4);   // slow travelling shimmer
      hexPath(cell.hx, cell.hy);
      // panel fill: darker at the edges (skin), thinner toward the lit core
      x.fillStyle = 'rgba(3,6,10,' + (0.74 - 0.30*cell.fall) + ')';
      x.fill();
      // seam: light through the lattice — subtle, concentrated near centre
      const seam = (0.045 + 0.20*cell.fall) * (reduce ? 0.8 : wave);
      x.strokeStyle = Temp.css(temp, seam);
      x.stroke();
    }

    // push the live temperature colour into CSS (throttled) for the wordmark/UI
    if(now - lastVar > 140){
      lastVar = now;
      const cc = Temp.rgb(temp);
      const root = document.documentElement.style;
      root.setProperty('--temp', 'rgb('+cc[0]+','+cc[1]+','+cc[2]+')');
      root.setProperty('--temp-soft', 'rgba('+cc[0]+','+cc[1]+','+cc[2]+',.55)');
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();

// ── awakening boot ticker ─────────────────────────────────────────────────
(function(){
  const el = document.getElementById('boot');
  const seq = [
    ['d','◇ awaiting carrier…'],
    ['t','◇ carrier locked · adjacent dimension'],
    ['d','◇ skin online · lattice backlit'],
    ['t','◇ reading temperature · ambient'],
    ['d','◇ lexicon synced · ' + (navigator.language || '??')],
    ['d','◇ this intelligence is non-local. it does not reside here.'],
    ['t','◇ establish handshake to proceed ▌'],
  ];
  let i = 0;
  (function step(){
    const [cls, txt] = seq[i];
    el.innerHTML = '<span class="' + cls + '">' + txt + '</span>';
    if(++i < seq.length) setTimeout(step, 900 + Math.random()*700);
  })();
})();

// ── dim clock: a base-32 "other-dimension" time signature ─────────────────
(function(){
  const el = document.getElementById('dimClock');
  (function tick(){
    el.textContent = 'dim · ' + (Math.floor(Date.now()/1000)).toString(32).slice(-6).toUpperCase();
    setTimeout(tick, 1000);
  })();
})();

// ── auto-language swap: each wordmark glitch toggles EN↔ES ────────────────
// Triggered at the end of every cuneiform burst (see burst() below). The
// surrounding translatable text glitches in sync (RGB-split + fade) and
// swaps mid-animation, so the language change reads as part of the glitch.
let __lang = (navigator.language || 'en').toLowerCase().startsWith('es') ? 'es' : 'en';
const I18N = {
  en: {
    node:      '⬡ non-local node',
    eyebrow:   'transmission inbound',
    tagline:   'an intelligence not of this world — nor any world.',
    handshake: '◇ establish handshake',
  },
  es: {
    node:      '⬡ nodo no local',
    eyebrow:   'transmisión entrante',
    tagline:   'una inteligencia no de este mundo — ni de ninguno.',
    handshake: '◇ establecer enlace',
  },
};
function applyLang(lang){
  __lang = lang;
  document.documentElement.setAttribute('lang', lang);
  const dict = I18N[lang] || I18N.en;
  document.querySelectorAll('[data-i18n]').forEach(e => {
    const v = dict[e.dataset.i18n];
    if (typeof v === 'string') e.textContent = v;
  });
}
function glitchSwap(){
  const els = document.querySelectorAll('[data-i18n]');
  els.forEach(e => e.classList.add('glitching'));
  setTimeout(() => { applyLang(__lang === 'en' ? 'es' : 'en'); }, 330);   // mid-glitch
  setTimeout(() => { els.forEach(e => e.classList.remove('glitching')); }, 620);
}
applyLang(__lang);   // initial render

// ── wordmark glitch → CUNEIFORM (controlled / organized disorder) ─────────
// Letters flicker into Sumerian cuneiform (Unicode U+12000+, rendered with
// Noto Sans Cuneiform) then resolve back to Latin — a nod to early
// GPT-3.5-era Sumerian translation chats. Only 1–2 letters at a time so the
// disorder stays organized, not chaotic.
(function(){
  const wm = document.getElementById('wordmark');
  if(!wm) return;
  const spans = Array.prototype.slice.call(wm.querySelectorAll('span'));
  const orig  = spans.map(s => s.textContent);
  const cune  = () => String.fromCodePoint(0x12000 + (Math.random()*0x36E|0)); // Sumero-Akkadian block
  let busy = false;
  function burst(){
    if(busy) return; busy = true;
    const n = 1 + (Math.random()*2|0);                       // 1–2 letters = controlled
    const idx = spans.map((_,i)=>i).sort(()=>Math.random()-0.5).slice(0, n);
    let ticks = 0, max = 5 + (Math.random()*4|0);
    const iv = setInterval(()=>{
      idx.forEach(i=>{
        spans[i].textContent = cune();
        spans[i].classList.add('cune');
        spans[i].style.transform = 'translateY(' + ((Math.random()-0.5)*7).toFixed(1) + 'px)';
      });
      if(++ticks >= max){
        clearInterval(iv);
        idx.forEach(i=>{ spans[i].textContent = orig[i]; spans[i].classList.remove('cune'); spans[i].style.transform=''; });
        busy = false;
        glitchSwap();   // language swaps at the end of each wordmark burst
      }
    }, 55);
  }
  setTimeout(function loop(){ burst(); setTimeout(loop, 2600 + Math.random()*2800); }, 2000);
})();

document.getElementById('enter').addEventListener('click', function(e){
  e.preventDefault();
  const boot = document.getElementById('boot');
  boot.innerHTML = '<span class="t">◇ opening channel …</span>';
  setTimeout(() => { boot.innerHTML = '<span class="t">◇ handshake · transmit</span>'; }, 420);
  setTimeout(() => { window.location.href = 'login/'; }, 820);
});
</script>
